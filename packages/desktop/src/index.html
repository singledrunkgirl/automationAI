<!doctype html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HackWithAI v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;color:#fafafa;display:flex;align-items:center;justify-content:center;min-height:100vh}
.loader{text-align:center}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#10b981;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#step{font-family:monospace;font-size:13px;color:#10b981;margin-top:8px}
</style></head>
<body>
<div class="loader" id="loader">
<div class="spinner"></div>
<p id="step">Connecting...</p>
</div>
<script>
// ── EVENT COUNTER ──
var __eventId=0;
var __eventLog=[];
function __log(id,tag,detail){
  var line="[EVENT "+String(id).padStart(3,'0')+"] "+tag+" "+detail;
  __eventLog.push(line);
  try{document.title=line.slice(0,60)}catch(x){}
  var el=document.getElementById("step");
  if(el)el.textContent=line;
}
// Global error capture
window.onerror=function(m,src,line,col,err){
  __eventId++;__log(__eventId,"JS-ONERROR",(src||"?")+":"+line+" "+(err&&err.message||m).slice(0,80));
  return false;
};
window.addEventListener("unhandledrejection",function(ev){
  __eventId++;__log(__eventId,"JS-UNHANDLED",(ev.reason&&ev.reason.message||String(ev.reason)).slice(0,80));
});
// Capture resource-level network errors (images, scripts, navigation to blocked ports)
window.addEventListener("error",function(ev){
  if(ev instanceof ErrorEvent)return; // JS errors handled by onerror
  var tag=(ev.target&&ev.target.tagName)||"unknown";
  var src=(ev.target&&ev.target.src)||(ev.target&&ev.target.href)||"";
  __eventId++;__log(__eventId,"RESOURCE-ERR",tag+" "+ev.message+" src="+src.slice(0,100));
},true);

// Intercept console.error to catch WebKit-level errors rendered as console messages
var __origConsoleError=console.error.bind(console);
console.error=function(){
  var args=Array.prototype.slice.call(arguments);
  try{document.title=("ERR: "+args.map(String).join(" ")).slice(0,60)}catch(x){}
  __eventId++;__log(__eventId,"CONSOLE-ERR",args.map(String).join(" ").slice(0,120));
  return __origConsoleError.apply(console,args);
};

// ── APP CODE ──
try{
__eventId++;__log(__eventId,"SCRIPT-START","location="+window.location.href.slice(0,50)+" protocol="+window.location.protocol+" tauriInternals="+(typeof window.__TAURI_INTERNALS__)+" tauri="+(typeof window.__TAURI__));

var APP_URL_PRIMARY="http://127.0.0.1:3006";
var APP_URL_FALLBACK="http://localhost:3006";
var APP_URL=APP_URL_PRIMARY;
var __hwai_navigationCompleted=false;

function navigateViaJS(url){
  __eventId++;__log(__eventId,"checkAndNavigate-JS-NAV","window.location.replace "+url);
  try{
    window.location.replace(url);
  }catch(e){
    __eventId++;__log(__eventId,"checkAndNavigate-JS-NAV-ERR",(e.message||String(e)).slice(0,80));
    try{
      window.location.href=url;
    }catch(e2){
      __eventId++;__log(__eventId,"checkAndNavigate-HREF-ERR",(e2.message||String(e2)).slice(0,80));
      window.__TAURI_INTERNALS__.invoke("navigate_to_url",{url:url});
    }
  }
}

function checkAndNavigate(){
  __eventId++;__log(__eventId,"checkAndNavigate-ENTER","navCompleted="+__hwai_navigationCompleted+" protocol="+window.location.protocol);

  if(__hwai_navigationCompleted){
    __eventId++;__log(__eventId,"checkAndNavigate-SKIP","deep-link already done");
    return;
  }

  function tryUrl(targetUrl,fallbackUrl){
    __eventId++;__log(__eventId,"checkAndNavigate-INVOKE","check_server_connectivity url="+targetUrl);
    window.__TAURI_INTERNALS__.invoke("check_server_connectivity",{url:targetUrl}).then(function(ok){
      __eventId++;__log(__eventId,"checkAndNavigate-RESULT","ok="+ok+" url="+targetUrl);
      if(__hwai_navigationCompleted)return;
      if(ok){
        __eventId++;__log(__eventId,"checkAndNavigate-NAVIGATE","navigating to "+targetUrl);
        navigateViaJS(targetUrl);
      }else if(fallbackUrl && fallbackUrl!==targetUrl){
        __eventId++;__log(__eventId,"checkAndNavigate-RETRY","primary failed, trying "+fallbackUrl);
        tryUrl(fallbackUrl,null);
      }else{
        __eventId++;__log(__eventId,"checkAndNavigate-FAIL","server unreachable on "+targetUrl);
      }
    }).catch(function(e){
      __eventId++;__log(__eventId,"checkAndNavigate-INVOKE-ERR","invoke error: "+(e.message||String(e)).slice(0,80));
      if(fallbackUrl && fallbackUrl!==targetUrl){
        tryUrl(fallbackUrl,null);
      }
    });
  }

  try{
    tryUrl(APP_URL_PRIMARY,APP_URL_FALLBACK);
  }catch(e){
    __eventId++;__log(__eventId,"checkAndNavigate-THROW",(e.message||String(e)).slice(0,80));
  }
}

__eventId++;__log(__eventId,"SETUP-DONE","scheduling checkAndNavigate in 600ms");
setTimeout(checkAndNavigate,600);

}catch(e){
  __eventId++;__log(__eventId,"SCRIPT-CRASH","top-level error: "+(e.message||String(e)).slice(0,80));
  document.title="CRASH: "+(e.message||String(e)).slice(0,50);
}
</script>
</body></html>
