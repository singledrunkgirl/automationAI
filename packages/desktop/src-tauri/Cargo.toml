[package]
name = "hwai-v2-v1-desktop"
version = "0.1.0"
description = "HackWithAI v2 Desktop Application"
authors = ["Private Application"]
edition = "2021"
rust-version = "1.78"

[lib]
name = "hwai_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "hwai-v2-v1-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-os = "2"
tauri-plugin-process = "2"
tauri-plugin-shell = "2"
tauri-plugin-deep-link = "2"
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-updater = "2"
url = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
tokio = { version = "1", features = ["time", "net", "io-util", "process", "sync", "macros"] }
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(not(target_os = "android"))'.dependencies]
portable-pty = "0.8"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-web-kit = { version = "0.2", features = ["WKWebView", "WKNavigation", "objc2-app-kit"] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = "none"
