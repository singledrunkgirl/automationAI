[[permission]]
identifier = "allow-desktop-command-bridge"
description = "Allows the desktop webview to reach the local command bridge."
commands.allow = [
  "get_dev_auth_port",
  "prepare_desktop_auth_state",
  "get_cmd_server_info",
  "get_local_file_metadata",
  "read_local_file",
  "execute_command",
  "execute_stream_command",
  "cancel_stream_command",
  "execute_pty_create",
  "execute_pty_input",
  "execute_pty_resize",
  "execute_pty_kill",
]
